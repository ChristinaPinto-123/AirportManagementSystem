<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AERO TRACKER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. FONTS & THEME */
        body { 
            background-color: #617891; 
            font-family: Arial, sans-serif; 
        }

        /* Impact for Brand and Page Titles */
        h2, .sidebar-header, .modal-title {
            font-family: 'Impact', 'Charcoal', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* GEORGIA for Table Headings */
        .table thead th {
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #1d2b46 !important;
            color: white !important;
        }

        /* Courier New for Database Data */
        .table tbody td, .form-control, .badge {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* 2. LAYOUT */
        .sidebar { 
            height: 100vh; width: 250px; position: fixed; 
            background: #1d2b46; padding-top: 20px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            color: #ffffff; font-size: 1.8rem; text-align: center;
            padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .sidebar a { 
            padding: 15px; text-decoration: none; color: #cbd5e0; 
            display: block; transition: 0.3s; font-family: 'Impact', sans-serif;
        }

        .sidebar a:hover { background: #34495e; color: white; padding-left: 25px; }
        .sidebar .active { background: #648ac3; color: white; }

        .content { margin-left: 260px; padding: 40px; }
        .card { border: none; border-radius: 15px; background: white; overflow: hidden; }
        
        /* Flight Badge Styling */
        .flight-badge {
            background-color: #648ac3;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div class="sidebar-header">🌐 AERO TRACKER</div>
    <a href="index.html" class="active">PASSENGERS</a>
    <a href="flights.html">FLIGHTS</a>
    <a href="employee.html">EMPLOYEES</a>
    <a href="tickets.html">TICKETS</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4 text-white">
        <h2 style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">Passenger Directory</h2>
        <div>
            <button class="btn btn-dark" onclick="loadData()">Refresh Manifest</button>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#passengerModal" onclick="prepareAdd()">+ Add Passenger</button>
        </div>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Passport</th>
                        <th>Name</th>
                        <th>Flight</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pTable">
                    <tr><td colspan="4" class="text-center py-4 text-dark">Connecting to Oracle...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="passengerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Register Passenger</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"><label class="fw-bold">Passport No</label><input type="text" id="p_no" class="form-control"></div>
                <div class="row">
                    <div class="col-6 mb-3"><label class="fw-bold">First Name</label><input type="text" id="p_fn" class="form-control"></div>
                    <div class="col-6 mb-3"><label class="fw-bold">Last Name</label><input type="text" id="p_ln" class="form-control"></div>
                </div>
                <div class="mb-3"><label class="fw-bold">Flight No</label><input type="text" id="p_fl" class="form-control"></div>
                <div class="mb-3"><label class="fw-bold">Address</label><input type="text" id="p_addr" class="form-control"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary w-100" id="saveBtn" onclick="saveData()">Save to Oracle</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let isEditMode = false;

    // 1. READ DATA
    async function loadData() {
        const tbody = document.getElementById('pTable');
        try {
            const res = await fetch('/api/passengers');
            const data = await res.json();
            tbody.innerHTML = '';
            
            data.forEach(p => {
                tbody.innerHTML += `
                    <tr class="align-middle">
                        <td class="fw-bold">${p.PASSPORT_NO}</td>
                        <td>${p.FNAME} ${p.LNAME}</td>
                        <td><span class="flight-badge">${p.FLIGHT_NO}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="prepareEdit('${p.PASSPORT_NO}', '${p.FNAME}', '${p.LNAME}', '${p.FLIGHT_NO}', '${p.ADDRESS}')">Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteEntry('${p.PASSPORT_NO}')">Delete</button>
                        </td>
                    </tr>`;
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Database Error: ${err.message}</td></tr>`;
        }
    }

    // 2. PREPARE ADD
    function prepareAdd() {
        isEditMode = false;
        document.getElementById('modalTitle').innerText = "Register New Passenger";
        document.getElementById('p_no').disabled = false;
        clearForm();
    }

    // 3. PREPARE EDIT
    function prepareEdit(id, fn, ln, fl, addr) {
        isEditMode = true;
        document.getElementById('modalTitle').innerText = "Update Passenger Details";
        document.getElementById('p_no').value = id;
        document.getElementById('p_no').disabled = true;
        document.getElementById('p_fn').value = fn;
        document.getElementById('p_ln').value = ln;
        document.getElementById('p_fl').value = fl;
        document.getElementById('p_addr').value = (addr === 'undefined' || addr === 'null') ? '' : addr;
        
        new bootstrap.Modal(document.getElementById('passengerModal')).show();
    }

    // 4. CREATE / UPDATE
    async function saveData() {
        const payload = {
            table: 'passengers',
            data: {
                fname: document.getElementById('p_fn').value,
                minit: '-',
                lname: document.getElementById('p_ln').value,
                flight_no: document.getElementById('p_fl').value,
                address: document.getElementById('p_addr').value
            }
        };

        const url = isEditMode ? '/api/update' : '/api/add';
        const method = isEditMode ? 'PUT' : 'POST';

        if (isEditMode) {
            payload.idColumn = 'passport_no';
            payload.idValue = document.getElementById('p_no').value;
        } else {
            payload.data.passport_no = document.getElementById('p_no').value;
        }

        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            location.reload();
        } else {
            const errText = await res.text();
            alert("Oracle Error: " + errText); // This will show the real ORA-XXXXX error
        }
    }

    // 5. DELETE
    async function deleteEntry(id) {
        if (!confirm(`Delete passenger ${id}?`)) return;
        const res = await fetch(`/api/delete/passengers/passport_no/${id}`, { method: 'DELETE' });
        if (res.ok) loadData();
    }

    function clearForm() {
        document.getElementById('p_no').value = '';
        document.getElementById('p_fn').value = '';
        document.getElementById('p_ln').value = '';
        document.getElementById('p_fl').value = '';
        document.getElementById('p_addr').value = '';
    }

    window.onload = loadData;
</script>
</body>
</html>
